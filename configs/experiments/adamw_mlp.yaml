seed: 123
output_dir: results/adamw_mlp

# runtime:
#   device: cuda

data:
  name: fashion_mnist
  root: ./outputs/data
  batch_size: 256
  num_workers: 2
  pin_memory: true
  train_subset: 4096
  val_subset: 2048
  normalize: true
  mean: [0.5]
  std: [0.5]

model:
  name: mlp
  input_dim: 784
  hidden_dims: [512, 256]
  output_dim: 10
  activation: relu
  dropout: 0.0

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

training:
  epochs: 3
  log_every: 10
  limit_train_batches: 20
  target_acc: 0.80
